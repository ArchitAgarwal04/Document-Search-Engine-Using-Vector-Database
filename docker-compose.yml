version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docsearch-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env          # reads your existing backend/.env directly — no root .env needed
    environment:
      - FRONTEND_URL=http://localhost   # override just this one for Docker networking
      - DEBUG=false
    volumes:
      - backend_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: docsearch-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend_data:
    driver: local
